{% extends "base.html" %}
{% block titulo %}Cambiar contraseña - TRAIBER{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card card-traiber p-4">
            <h1 class="h4 fw-bold mb-3">Cambiar contraseña</h1>
            <form method="post">
                {% csrf_token %}
                {% include "partials/campos_formulario.html" %}
                <button type="submit" class="btn btn-traiber w-100 mt-2">Actualizar contraseña</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
