{% extends "base.html" %}
{% block titulo %}Iniciar sesión - TRAIBER{% endblock %}
{% block contenido %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card card-traiber p-4">
            <h1 class="h3 fw-bold mb-4 text-center">Inicia sesión</h1>
            <form method="post">
                {% csrf_token %}
                {% include "partials/campos_formulario.html" %}
                <button type="submit" class="btn btn-traiber w-100 mt-2">Ingresar</button>
            </form>
            <p class="text-center mt-3 mb-0">
                ¿No tienes cuenta? <a href="{% url 'usuarios:elegir_rol_registro' %}">Regístrate</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
