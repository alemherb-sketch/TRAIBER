databases:
  - name: traiber-db
    databaseName: traiber
    user: traiber
    plan: free

services:
  - type: web
    name: traiber
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: traiber-db
          property: connectionString
